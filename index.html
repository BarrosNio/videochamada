<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Waplog Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

        /* VÍDEO REMOTO (TELA CHEIA) */
        #remote-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #111; }

        /* SEU VÍDEO (MINIATURA) */
        #local-video { position: fixed; top: 20px; right: 20px; width: 85px; height: 125px; border-radius: 12px; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); z-index: 100; transform: scaleX(-1); }

        /* INTERFACE */
        #ui-overlay { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }

        /* MENSAGENS FLUTUANTES */
        #messages { padding: 20px; display: flex; flex-direction: column; gap: 8px; max-height: 40%; overflow-y: auto; pointer-events: auto; }
        .msg-bubble { background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 15px; color: white; font-size: 13px; align-self: flex-start; max-width: 80%; border: 1px solid rgba(255,255,255,0.1); }
        .msg-me { background: rgba(59, 130, 246, 0.5); align-self: flex-end; }
        .chat-img { max-width: 150px; border-radius: 10px; margin-top: 5px; }

        /* PAINEL DE MÍDIA (GAVETA) */
        #media-drawer { position: absolute; bottom: 85px; left: 15px; right: 15px; background: rgba(20,20,20,0.95); backdrop-filter: blur(20px); border-radius: 20px; padding: 15px; display: none; pointer-events: auto; border: 1px solid rgba(255,255,255,0.1); }

        /* BARRA DE COMANDO */
        #input-bar { padding: 15px; display: flex; align-items: center; gap: 10px; pointer-events: auto; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .input-box { flex: 1; background: rgba(255,255,255,0.15); border-radius: 30px; display: flex; align-items: center; padding: 2px 15px; border: 1px solid rgba(255,255,255,0.1); }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }

        #login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items-center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div id="ui-overlay">
        <div class="absolute top-8 left-5 pointer-events-auto">
            <select id="lang-select" class="bg-black/50 text-[10px] text-blue-400 p-2 rounded-full border border-white/10 outline-none uppercase font-bold">
                <option value="en">Inglês</option><option value="ru">Russo</option>
                <option value="es">Espanhol</option><option value="pt" selected>Português</option>
            </select>
        </div>

        <div id="messages"></div>

        <div id="media-drawer">
            <div class="flex justify-around mb-4">
                <label class="cursor-pointer text-center">
                    <span class="text-2xl block">📷</span>
                    <span class="text-[10px] text-zinc-400">FOTO</span>
                    <input type="file" accept="image/*" class="hidden" onchange="sendFile(this, 'img')">
                </label>
                <label class="cursor-pointer text-center">
                    <span class="text-2xl block">🎵</span>
                    <span class="text-[10px] text-zinc-400">MÚSICA</span>
                    <input type="file" accept="audio/*" class="hidden" onchange="sendFile(this, 'audio')">
                </label>
            </div>
            <div id="emojis" class="flex flex-wrap gap-3 justify-center text-2xl">
                <span onclick="addEmoji('❤️')" class="cursor-pointer">❤️</span>
                <span onclick="addEmoji('🔥')" class="cursor-pointer">🔥</span>
                <span onclick="addEmoji('😘')" class="cursor-pointer">😘</span>
                <span onclick="addEmoji('😍')" class="cursor-pointer">😍</span>
                <span onclick="addEmoji('🌹')" class="cursor-pointer">🌹</span>
                <span onclick="addEmoji('✨')" class="cursor-pointer">✨</span>
            </div>
        </div>

        <div id="input-bar">
            <button onclick="toggleDrawer()" class="text-2xl">➕</button>
            <div class="input-box">
                <input id="msg-input" type="text" placeholder="Escreva algo...">
            </div>
            <button onclick="sendMsg()" class="w-11 h-11 bg-blue-600 rounded-full flex items-center justify-center">➤</button>
        </div>
    </div>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-white/10 text-center shadow-2xl">
            <h1 class="text-blue-500 font-black italic text-xl mb-6">BARROS CONNECT</h1>
            <div id="my-id-label" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] border border-white/5 break-all" onclick="copyID()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-white/10 outline-none text-center text-white" placeholder="ID DA AMIGA">
            <button onclick="startApp()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase tracking-widest">ENTRAR</button>
        </div>
    </div>

    <script>
        const peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});
        let conn, localStream;

        navigator.mediaDevices.getUserMedia({video: { facingMode: "user" }, audio: true}).then(s => {
            localStream = s; document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id-label').innerText = id);
        
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s; rv.play();
                document.getElementById('login').style.display = 'none';
            });
        });

        peer.on('connection', c => { conn = c; setupChat(); });

        function startApp() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            peer.call(tid, localStream).on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s; rv.play();
            });
            conn = peer.connect(tid); setupChat();
        }

        function setupChat() {
            document.getElementById('login').style.display = 'none';
            conn.on('data', d => {
                addMsg(d.orig, d.trans, 'friend', d.file, d.fileType);
            });
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input'), l = document.getElementById('lang-select').value;
            if(!i.value) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await res.json();
            const tr = j.responseData.translatedText;
            if(conn) conn.send({type: 'msg', orig: i.value, trans: tr});
            addMsg(i.value, tr, 'me'); i.value = '';
        }

        function sendFile(input, type) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                if(conn) conn.send({type: 'msg', file: reader.result, fileType: type, orig: type==='img'?'📷 Foto':'🎵 Música', trans: type==='img'?'Sent a photo':'Sent a song'});
                addMsg(type==='img'?'📷 Foto':'🎵 Música', type==='img'?'Sent a photo':'Sent a song', 'me', reader.result, type);
                toggleDrawer();
            };
            reader.readAsDataURL(file);
        }

        function addMsg(o, t, s, file = null, fType = null) {
            const b = document.getElementById('messages');
            let content = `<p class="text-[9px] opacity-60">${o}</p><p>${t}</p>`;
            if(file && fType === 'img') content += `<img src="${file}" class="chat-img">`;
            if(file && fType === 'audio') content += `<audio src="${file}" controls class="w-full mt-2 h-8 filter invert"></audio>`;
            
            b.innerHTML += `<div class="msg-bubble ${s==='me'?'msg-me':''}">${content}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        function addEmoji(e) { document.getElementById('msg-input').value += e; }
        function toggleDrawer() { 
            const d = document.getElementById('media-drawer');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }
        function copyID() { navigator.clipboard.writeText(document.getElementById('my-id-label').innerText); alert("ID Copiado!"); }
    </script>
</body>
</html>
