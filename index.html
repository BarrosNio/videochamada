<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect Max - Organizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* VÍDEO NO TOPO (FIXO 30%) */
        #video-top { height: 30vh; background: #111; position: relative; flex-shrink: 0; border-bottom: 2px solid #333; z-index: 50; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 10px; right: 10px; width: 60px; height: 85px; border-radius: 12px; border: 2px solid #3b82f6; transform: scaleX(-1); z-index: 60; object-fit: cover; }

        /* ÁREA DO CHAT (RESTANTE 70%) */
        #chat-main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; position: relative; overflow: hidden; }
        
        /* BARRA DE CONTROLES (IDIOMA, ETC) */
        #controls-bar { height: 40px; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #222; flex-shrink: 0; }
        
        /* MENSAGENS (COM SCROLL) */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }

        /* BALÕES DE MENSAGEM */
        .msg-box { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .msg-me { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .msg-friend { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }

        /* BARRA DE DIGITAR FIXA */
        #input-footer { position: absolute; bottom: 0; width: 100%; background: #1a1a1a; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; z-index: 100; height: 70px; }
        #msg-input { flex: 1; background: #2a2a2a; border-radius: 25px; padding: 10px 15px; color: #fff; border: none; font-size: 15px; outline: none; }

        #login { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; items-center; justify-content: center; padding: 20px; }
        .drawer { position: absolute; bottom: 75px; left: 10px; right: 10px; background: #1a1a1a; border-radius: 20px; padding: 15px; z-index: 150; border: 1px solid #333; }
    </style>
</head>
<body>

    <header id="video-top">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
    </header>

    <main id="chat-main">
        <div id="controls-bar">
            <select id="lang-select" class="bg-transparent text-[10px] font-bold text-blue-400 outline-none uppercase">
                <option value="en" selected>INGLÊS</option><option value="es">ESPANHOL</option>
                <option value="pt">PORTUGUÊS</option><option value="ru">RUSSO</option>
                <option value="uk">UCRANIANO</option><option value="tl">FILIPINO</option>
            </select>
            <p id="typing" class="text-[9px] text-blue-500 hidden animate-pulse font-bold">DIGITANDO...</p>
        </div>

        <div id="messages" class="no-scrollbar"></div>

        <div id="extra-panel" class="drawer hidden">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="sendWink('kiss')" class="bg-zinc-800 p-3 rounded-xl text-[10px] font-bold">💋 BEIJO</button>
                <button onclick="sendWink('heart')" class="bg-zinc-800 p-3 rounded-xl text-[10px] font-bold">❤️ CORAÇÃO</button>
            </div>
            <div id="emoji-list" class="flex flex-wrap gap-2 text-2xl justify-center"></div>
        </div>

        <footer id="input-footer">
            <button onclick="toggleDrawer()" class="text-2xl">😊</button>
            <label class="text-2xl cursor-pointer">📎<input type="file" id="img-in" class="hidden" accept="image/*" onchange="sendImg(this)"></label>
            <input id="msg-input" type="text" placeholder="Mensagem..." oninput="isTyping()">
            <button id="mic-btn" onmousedown="startV()" onmouseup="stopV()" ontouchstart="startV()" ontouchend="stopV()" class="text-2xl text-red-500">🎙️</button>
            <button onclick="sendMsg()" class="bg-blue-600 w-11 h-11 rounded-full flex items-center justify-center">➤</button>
        </footer>
    </main>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-zinc-800 text-center">
            <h1 class="text-blue-500 font-black text-xl mb-4 italic uppercase">Global Chat</h1>
            <input id="my-name" class="w-full bg-black p-4 rounded-xl mb-3 border border-zinc-800 outline-none text-sm" placeholder="Seu Nome">
            <div id="my-id-ui" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] border border-zinc-800 break-all cursor-pointer" onclick="copyID()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-800 outline-none text-center" placeholder="ID DA AMIGA">
            <button onclick="startApp()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase shadow-lg">CONECTAR</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream, mediaRecorder, audioChunks = [], recognition, transcribed = "";
        const emojis = ["😀","😂","😍","🤔","😢","👍","❤️","🔥","✨","🙏"];

        emojis.forEach(e => document.getElementById('emoji-list').innerHTML += `<span onclick="addEmoji('${e}')" class="cursor-pointer">${e}</span>`);
        function addEmoji(e) { document.getElementById('msg-input').value += e; }
        function toggleDrawer() { document.getElementById('extra-panel').classList.toggle('hidden'); }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) { recognition = new Speech(); recognition.lang = 'pt-BR'; recognition.onresult = (e) => transcribed = e.results[0][0].transcript; }

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s; document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id-ui').innerText = id);
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s; rv.play();
                document.getElementById('login').style.display = 'none';
            });
        });
        peer.on('connection', c => { conn = c; initChat(); });

        function startApp() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            peer.call(tid, localStream).on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s; rv.play();
            });
            conn = peer.connect(tid); initChat();
        }

        function initChat() {
            document.getElementById('login').style.display = 'none';
            conn.on('data', d => {
                if(d.type === 'msg') addMsg(d.orig, d.trans, 'friend', d.audio, d.img);
                if(d.type === 'typing') {
                    document.getElementById('typing').classList.remove('hidden');
                    setTimeout(() => document.getElementById('typing').classList.add('hidden'), 2000);
                }
            });
        }

        function isTyping() { if(conn) conn.send({type: 'typing'}); }

        async function sendMsg() {
            const i = document.getElementById('msg-input'), l = document.getElementById('lang-select').value;
            if(!i.value) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await res.json();
            const tr = j.responseData.translatedText;
            if(conn) conn.send({type: 'msg', orig: i.value, trans: tr});
            addMsg(i.value, tr, 'me'); i.value = '';
            document.getElementById('extra-panel').classList.add('hidden');
        }

        function addMsg(o, t, s, au = null, im = null) {
            const b = document.getElementById('messages');
            let h = "";
            if(im) h += `<img src="${im}" class="rounded-xl mb-2 max-w-full">`;
            if(au) h += `<audio src="${au}" controls class="w-full h-8 mb-2 filter invert"></audio>`;
            if(t) h += `<p class="font-bold text-sm">${t}</p><p class="text-[9px] opacity-40 italic mt-1">${o}</p>`;
            
            b.innerHTML += `<div class="msg-box ${s==='me'?'msg-me':'msg-friend'}">${h}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        function sendImg(i) {
            const r = new FileReader(); r.onload = (e) => {
                if(conn) conn.send({type: 'msg', img: e.target.result});
                addMsg('', '', 'me', null, e.target.result);
            }; r.readAsDataURL(i.files[0]);
        }

        async function startV() {
            transcribed = ""; audioChunks = []; if(recognition) recognition.start();
            mediaRecorder = new MediaRecorder(localStream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const b = new Blob(audioChunks, {type:'audio/mp3'});
                const r = new FileReader();
                r.onload = async () => {
                    const l = document.getElementById('lang-select').value;
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(transcribed||"...")}&langpair=pt|${l}`);
                    const j = await res.json();
                    const tr = j.responseData.translatedText;
                    if(conn) conn.send({type: 'msg', audio: r.result, orig: transcribed, trans: tr});
                    addMsg(transcribed, tr, 'me', r.result);
                };
                r.readAsDataURL(b);
            };
            mediaRecorder.start();
        }
        function stopV() { if(recognition) recognition.stop(); if(mediaRecorder) mediaRecorder.stop(); }

        function sendWink(k) { if(conn) conn.send({type: 'msg', orig: '💋', trans: k === 'kiss' ? 'ENVIOU UM BEIJO!' : 'ENVIOU UM CORAÇÃO!'}); addMsg('💋', 'VOCÊ ENVIOU!', 'me'); toggleDrawer(); }
        function copyID() { navigator.clipboard.writeText(document.getElementById('my-id-ui').innerText); alert("ID Copiado!"); }
    </script>
</body>
</html>
