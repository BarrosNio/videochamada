<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Waplog Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

        /* VÍDEO FUNDO TOTAL */
        #remote-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #000; }
        #local-video { position: fixed; top: 20px; right: 20px; width: 80px; height: 110px; border-radius: 12px; object-fit: cover; border: 1.5px solid rgba(255,255,255,0.3); z-index: 100; transform: scaleX(-1); }

        /* CAMADA UI */
        #ui-layer { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }

        /* CHAT FLUTUANTE */
        #messages { padding: 20px; display: flex; flex-direction: column; gap: 8px; max-height: 40%; overflow-y: auto; pointer-events: auto; }
        .msg-bubble { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 15px; color: white; font-size: 13px; align-self: flex-start; max-width: 85%; border: 0.5px solid rgba(255,255,255,0.1); }
        .msg-me { align-self: flex-end; background: rgba(59, 130, 246, 0.5); }

        /* INPUT */
        #input-bar { padding: 20px; display: flex; align-items: center; gap: 10px; pointer-events: auto; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        .input-box { flex: 1; background: rgba(255,255,255,0.2); border-radius: 30px; display: flex; align-items: center; padding: 2px 15px; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 15px; }

        /* GAVETA MÍDIA */
        #media-drawer { position: absolute; bottom: 85px; left: 15px; right: 15px; background: rgba(15,15,15,0.95); border-radius: 20px; padding: 15px; display: none; pointer-events: auto; }

        /* LOGIN */
        #login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items-center; justify-content: center; padding: 20px; pointer-events: auto; }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline muted></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div id="ui-layer">
        <div class="absolute top-10 left-5 pointer-events-auto">
            <select id="lang-select" class="bg-black/60 text-white text-[10px] font-bold p-2 rounded-full border border-white/20 outline-none uppercase">
                <option value="es">Espanhol</option>
                <option value="ru">Russo</option>
                <option value="tl">Filipino</option>
                <option value="en" selected>Inglês</option>
                <option value="zh-TW">Chinês</option>
                <option value="uk">Ucraniano</option>
                <option value="pt">Português</option>
            </select>
        </div>

        <div id="messages"></div>

        <div id="media-drawer">
            <div class="flex justify-around mb-4">
                <label class="cursor-pointer">📷<input type="file" accept="image/*" class="hidden" onchange="sendF(this, 'img')"></label>
                <label class="cursor-pointer">🎵<input type="file" accept="audio/*" class="hidden" onchange="sendF(this, 'audio')"></label>
            </div>
            <div class="flex justify-center gap-4 text-2xl">
                <span onclick="addE('❤️')">❤️</span><span onclick="addE('🔥')">🔥</span><span onclick="addE('😘')">😘</span>
            </div>
        </div>

        <div id="input-bar">
            <button onclick="toggleM()" class="text-2xl">➕</button>
            <div class="input-box">
                <input id="msg-input" type="text" placeholder="Tradução ativa...">
            </div>
            <button onclick="send()" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center">➤</button>
        </div>
    </div>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-white/10 text-center">
            <h2 class="text-blue-500 font-black italic text-xl mb-6">BARROS CONNECT</h2>
            <div id="my-id-label" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] border border-white/10 break-all cursor-pointer" onclick="copyID()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-white/10 outline-none text-center text-white" placeholder="ID DA AMIGA">
            <button onclick="startApp()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase">CONECTAR</button>
        </div>
    </div>

    <script>
        const peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});
        let conn, localStream;

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s;
            document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id-label').innerText = id);

        // ESSENCIAL: Ouvir quando ela ligar
        peer.on('call', call => {
            call.answer(localStream);
            setupStream(call);
        });

        peer.on('connection', c => {
            conn = c;
            setupChat();
        });

        function startApp() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            const call = peer.call(tid, localStream);
            setupStream(call);
            conn = peer.connect(tid);
            setupChat();
        }

        function setupStream(call) {
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s;
                rv.play().catch(() => {
                    rv.muted = true;
                    rv.play();
                });
                document.getElementById('login').style.display = 'none';
            });
        }

        function setupChat() {
            document.getElementById('login').style.display = 'none';
            conn.on('data', d => {
                if(d.type === 'msg') addM(d.orig, d.trans, 'friend', d.file, d.fType);
            });
        }

        async function send() {
            const i = document.getElementById('msg-input'), l = document.getElementById('lang-select').value;
            if(!i.value) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await res.json();
            const tr = j.responseData.translatedText;
            if(conn) conn.send({type: 'msg', orig: i.value, trans: tr});
            addM(i.value, tr, 'me');
            i.value = '';
        }

        function sendF(input, type) {
            const r = new FileReader();
            r.onload = () => {
                if(conn) conn.send({type:'msg', file: r.result, fType: type, orig: 'Mídia', trans: 'Sent file'});
                addM('Mídia', 'Sent file', 'me', r.result, type);
                toggleM();
            };
            r.readAsDataURL(input.files[0]);
        }

        function addM(o, t, s, file, type) {
            const b = document.getElementById('messages');
            let content = `<p class="text-[10px] opacity-60">${o}</p><p>${t}</p>`;
            if(file && type === 'img') content += `<img src="${file}" class="max-w-[150px] rounded-lg mt-2">`;
            if(file && type === 'audio') content += `<audio src="${file}" controls class="w-full mt-2 filter invert"></audio>`;
            b.innerHTML += `<div class="msg-bubble ${s==='me'?'msg-me':''}">${content}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        function addE(e) { document.getElementById('msg-input').value += e; }
        function toggleM() { const d = document.getElementById('media-drawer'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        function copyID() { navigator.clipboard.writeText(document.getElementById('my-id-label').innerText); alert("Copiado!"); }
    </script>
</body>
</html>
