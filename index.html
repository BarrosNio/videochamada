<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barros Connect - Full Language</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #eee;
            overflow: hidden;
        }

        #wink-layer {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .wink-animation {
            animation: msnWink 3s ease-in-out forwards;
        }

        @keyframes msnWink {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            20% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .shake {
            animation: shakeScreen 0.4s infinite;
        }

        @keyframes shakeScreen {
            0% {
                transform: translate(1px, 1px);
            }

            20% {
                transform: translate(-3px, 0px);
            }

            100% {
                transform: translate(0px, 0px);
            }
        }

        #local-video {
            transform: scaleX(-1);
            border-radius: 12px;
            width: 100%;
            height: 140px;
            object-fit: cover;
            border: 1px solid #333;
        }

        .emoji-item {
            cursor: pointer;
            font-size: 1.4rem;
            padding: 4px;
            transition: 0.1s;
            display: inline-block;
            width: 40px;
            text-align: center;
        }

        .emoji-item:hover {
            transform: scale(1.2);
            background: #27272a;
            border-radius: 8px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <div id="wink-layer"><img id="wink-img" src="" class="max-w-[70%]"></div>

    <header
        class="h-14 border-b border-zinc-800 flex items-center justify-between px-6 bg-zinc-900/80 backdrop-blur-md">
        <h1 class="font-black text-blue-500 italic">BARROS CONNECT <span
                class="text-white font-light text-[10px] ml-2 uppercase">Global Edition</span></h1>
        <div onclick="copyID()"
            class="text-[10px] bg-zinc-800 px-3 py-1 rounded-lg cursor-pointer border border-zinc-700">ID: <span
                id="peer-id" class="text-blue-400 font-mono">...</span></div>
    </header>

    <main class="flex flex-1 overflow-hidden" id="main-content">
        <section class="flex-1 bg-black relative flex items-center justify-center">
            <video id="remote-video" autoplay class="w-full h-full object-cover absolute"></video>
            <div id="video-share-container" class="hidden z-20 w-full h-full bg-black flex items-center justify-center">
                <iframe id="shared-iframe" class="w-full h-full hidden" frameborder="0" allowfullscreen></iframe>
                <video id="shared-video-player" controls class="w-full h-full hidden"></video>
                <button onclick="closeVideo()"
                    class="absolute top-4 right-4 bg-red-600 p-2 rounded-full z-30 text-xs font-bold">FECHAR</button>
            </div>
            <div id="conn-modal" class="absolute inset-0 bg-black/95 flex items-center justify-center z-[60]">
                <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-80 text-center shadow-2xl">
                    <p class="mb-6 font-bold text-blue-500 uppercase">Barros Connect</p>
                    <input id="target-id" type="text"
                        class="w-full bg-zinc-800 p-3 rounded-xl mb-4 text-center border border-zinc-700 outline-none font-mono"
                        placeholder="ID do Amigo">
                    <button onclick="startConnection()"
                        class="w-full bg-blue-600 p-3 rounded-xl font-bold uppercase text-xs">Conectar</button>
                </div>
            </div>
        </section>

        <aside class="w-80 border-l border-zinc-800 bg-zinc-900/50 flex flex-col">
            <div class="p-4 border-b border-zinc-800">
                <video id="local-video" autoplay muted></video>

                <select id="lang-select"
                    class="w-full mt-3 bg-zinc-800 p-2 rounded-lg text-[10px] font-bold text-blue-300 outline-none">
                    <option value="pt" selected>PORTUGUÊS (BR)</option>
                    <option value="es">ESPANHOL</option>
                    <option value="en">INGLÊS</option>
                    <option value="zh-CN">CHINÊS (SIMPLIFICADO)</option>
                    <option value="zh-TW">CHINÊS (TRADICIONAL)</option>
                    <option value="ru">RUSSO</option>
                    <option value="uk">UCRANIANO</option>
                    <option value="tl">FILIPINO (TAGALOG)</option>
                    <option value="ja">JAPONÊS</option>
                </select>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm"></div>

            <div id="extra-panel" class="hidden bg-zinc-900 p-4 border-t border-zinc-800 max-h-80 overflow-y-auto">
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button onclick="sendWink('kiss')" class="bg-zinc-800 p-2 rounded-lg text-[8px] font-bold">💋
                        BEIJO</button>
                    <button onclick="sendWink('knock')" class="bg-zinc-800 p-2 rounded-lg text-[8px] font-bold">✊
                        TOC-TOC</button>
                    <button onclick="sendWink('butt')" class="bg-zinc-800 p-2 rounded-lg text-[8px] font-bold">🍑
                        BUNDA</button>
                </div>
                <div id="recent-container" class="mb-4 hidden border-t border-zinc-800 pt-3">
                    <p class="text-[9px] font-bold text-blue-400 mb-2 uppercase italic">Favoritos</p>
                    <div id="recent-list" class="flex flex-wrap gap-1"></div>
                </div>
                <div id="emoji-list" class="flex flex-wrap gap-1"></div>
            </div>

            <div id="media-input-box" class="hidden bg-zinc-800 p-4 border-t border-zinc-700">
                <input id="media-url" type="text" placeholder="Cole o Link YouTube/MP3/MP4"
                    class="w-full bg-black p-2 rounded text-[10px] outline-none mb-3">
                <div class="flex gap-2">
                    <button onclick="sendMedia('video')"
                        class="flex-1 bg-blue-600 py-2 rounded text-[10px] font-bold">VÍDEO</button>
                    <button onclick="sendMedia('audio')"
                        class="flex-1 bg-purple-600 py-2 rounded text-[10px] font-bold">MÚSICA</button>
                </div>
                <audio id="shared-audio" controls class="hidden w-full mt-3 h-8"></audio>
            </div>

            <div class="p-4 bg-zinc-900 border-t border-zinc-800 flex items-center gap-3">
                <button onclick="toggleExtra()" class="text-xl opacity-70 hover:opacity-100">😊</button>
                <button onclick="toggleMediaInput()" class="text-xl opacity-70 hover:opacity-100">🔗</button>
                <label class="text-xl opacity-70 hover:opacity-100 cursor-pointer">📎<input id="file-input" type="file"
                        class="hidden" accept="image/*" onchange="sendFile(this)"></label>
                <input id="msg-input" type="text" class="flex-1 bg-zinc-800 p-2 rounded-lg outline-none text-xs"
                    placeholder="Mensagem...">
                <button onclick="sendMsg()" class="text-blue-500 font-bold">➤</button>
            </div>
        </aside>
    </main>

    <script>
        const peer = new Peer();
        let conn, localStream;
        const SOUNDS = { kiss: "https://www.myinstants.com/media/sounds/kiss-sound-effect.mp3", knock: "https://www.myinstants.com/media/sounds/knock-knock.mp3", butt: "https://www.myinstants.com/media/sounds/cartoon-boing.mp3" };
        const GIFS = { kiss: "https://media.giphy.com/media/3o7TKLv3fDYLxH8hW0/giphy.gif", knock: "https://media.giphy.com/media/3o7TKVUn7XYM6mfuCs/giphy.gif", butt: "https://media.giphy.com/media/l41lTfOR5X9m7Wv8k/giphy.gif" };
        const allEmojis = ["😀", "😃", "😄", "😁", "😆", "😅", "😂", "🤣", "😊", "😇", "🙂", "🙃", "😉", "😌", "😍", "🥰", "😘", "😗", "😙", "😚", "😋", "😛", "😝", "😜", "🤪", "🤨", "🧐", "😎", "🤩", "🥳", "😏", "😒", "😞", "😔", "😟", "😕", "🙁", "😣", "😖", "😫", "😩", "🥺", "😢", "😭", "😤", "😠", "😡", "🤬", "🤯", "😳", "🥵", "🥶", "😱", "😨", "😰", "😥", "😓", "🤗", "🤔", "🤭", "🤫", "🤥", "😶", "😐", "😑", "😬", "🙄", "😯", "😦", "😧", "😮", "😲", "🥱", "😴", "🤤", "😪", "😵", "🤐", "🥴", "🤢", "🤮", "🤧", "😷", "🤒", "🤕", "🤑", "🤠", "😈", "👿", "👹", "👺", "🤡", "👻", "💀", "☠️", "👽", "👾", "🤖", "🎃", "😺", "😸", "😹", "😻", "😼", "😽", "🙀", "😿", "😾", "❤️", "🧡", "💛", "💚", "💙", "💜", "🖤", "🤍", "🤎", "💔", "❣️", "💕", "💞", "💓", "💗", "💖", "💘", "💝", "💟", "👋", "🤚", "🖐️", "✋", "🖖", "👌", "✌️", "🤞", "🤟", "🤘", "🤙", "👈", "👉", "👆", "👇", "👍", "👎", "✊", "👊", "👏", "🙌", "👐", "🤝", "🙏", "💪", "🧠", "👀", "👁️", "👅", "👄"];

        let favorites = JSON.parse(localStorage.getItem('fav_emojis')) || [];

        function renderEmojis() {
            const list = document.getElementById('emoji-list');
            const recents = document.getElementById('recent-list');
            const recentContainer = document.getElementById('recent-container');
            list.innerHTML = "";
            allEmojis.forEach(e => { list.innerHTML += `<span class="emoji-item" onclick="addEmoji('${e}')">${e}</span>`; });
            if (favorites.length > 0) {
                recentContainer.classList.remove('hidden');
                recents.innerHTML = "";
                favorites.slice(0, 12).forEach(e => { recents.innerHTML += `<span class="emoji-item" onclick="addEmoji('${e}')">${e}</span>`; });
            }
        }

        function addEmoji(e) {
            document.getElementById('msg-input').value += e;
            favorites = [e, ...favorites.filter(item => item !== e)];
            localStorage.setItem('fav_emojis', JSON.stringify(favorites));
            renderEmojis();
        }

        renderEmojis();

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => {
            localStream = s;
            document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('peer-id').innerText = id);
        peer.on('connection', c => { conn = c; setupConn(); document.getElementById('conn-modal').style.display = 'none'; });
        peer.on('call', call => { call.answer(localStream); call.on('stream', s => document.getElementById('remote-video').srcObject = s); });

        function startConnection() {
            const id = document.getElementById('target-id').value;
            conn = peer.connect(id); setupConn();
            peer.call(id, localStream).on('stream', s => document.getElementById('remote-video').srcObject = s);
            document.getElementById('conn-modal').style.display = 'none';
        }

        function setupConn() {
            conn.on('data', data => {
                if (data.type === 'wink') receiveWink(data.kind);
                else if (data.type === 'file') addMessage('', '', 'Amigo', data.data, true);
                else if (data.type === 'video') playSharedVideo(data.url);
                else if (data.type === 'audio') playSharedAudio(data.url);
                else addMessage(data.text, data.trans, 'Amigo');
            });
        }

        function toggleMediaInput() { document.getElementById('media-input-box').classList.toggle('hidden'); }

        function sendMedia(type) {
            const url = document.getElementById('media-url').value;
            if (!url || !conn) return;
            conn.send({ type: type, url: url });
            if (type === 'video') playSharedVideo(url);
            else playSharedAudio(url);
            toggleMediaInput();
        }

        function playSharedVideo(url) {
            const container = document.getElementById('video-share-container');
            const iframe = document.getElementById('shared-iframe');
            const video = document.getElementById('shared-video-player');
            container.classList.remove('hidden');
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const vid = url.split('v=')[1] || url.split('/').pop().split('?')[0];
                iframe.src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                iframe.classList.remove('hidden'); video.classList.add('hidden');
            } else {
                video.src = url; video.play();
                video.classList.remove('hidden'); iframe.classList.add('hidden');
            }
        }

        function playSharedAudio(url) {
            const audio = document.getElementById('shared-audio');
            audio.src = url; audio.play();
            audio.classList.remove('hidden');
        }

        function closeVideo() {
            document.getElementById('video-share-container').classList.add('hidden');
            document.getElementById('shared-iframe').src = "";
            document.getElementById('shared-video-player').pause();
        }

        function sendFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                conn.send({ type: 'file', data: e.target.result });
                addMessage('', '', 'Você', e.target.result, true);
            };
            reader.readAsDataURL(input.files[0]);
        }

        function sendWink(kind) { conn.send({ type: 'wink', kind: kind }); receiveWink(kind); toggleExtra(); }

        function receiveWink(kind) {
            new Audio(SOUNDS[kind]).play();
            const img = document.getElementById('wink-img');
            img.src = GIFS[kind];
            document.getElementById('wink-layer').style.display = 'flex';
            img.className = 'wink-animation';
            if (kind === 'knock') document.getElementById('main-content').classList.add('shake');
            setTimeout(() => { document.getElementById('wink-layer').style.display = 'none'; document.getElementById('main-content').classList.remove('shake'); }, 3000);
        }

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const lang = document.getElementById('lang-select').value;
            if (!input.value) return;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input.value)}&langpair=pt|${lang}`);
                const json = await res.json();
                const trans = json.responseData.translatedText;
                conn.send({ text: input.value, trans: trans });
                addMessage(input.value, trans, 'Você');
            } catch {
                conn.send({ text: input.value, trans: input.value });
                addMessage(input.value, input.value, 'Você');
            }
            input.value = '';
        }

        function addMessage(orig, trans, sender, data = null, isFile = false) {
            const box = document.getElementById('chat-messages');
            const isMe = sender === 'Você';
            let html = isFile ? `<img src="${data}" class="rounded-xl max-w-full shadow-lg">` : `<p class="text-[8px] opacity-40 italic mb-1">${orig}</p><p class="font-bold">${trans}</p>`;
            box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}"><div class="${isMe ? 'bg-blue-600' : 'bg-zinc-800'} p-3 rounded-2xl max-w-[85%] shadow-md border border-white/5">${html}</div></div>`;
            box.scrollTop = box.scrollHeight;
        }

        function toggleExtra() { document.getElementById('extra-panel').classList.toggle('hidden'); }
        function copyID() { navigator.clipboard.writeText(document.getElementById('peer-id').innerText); alert("ID Copiado!"); }
    </script>
</body>

</html>
