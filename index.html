<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Ultra V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        
        body { font-family: 'Roboto', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* VÍDEO NO TOPO - TAMANHO CONTROLADO */
        #video-section { position: relative; width: 100%; height: 25vh; background: #111; flex-shrink: 0; border-bottom: 2px solid #333; z-index: 50; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 10px; right: 10px; width: 60px; height: 80px; border-radius: 10px; object-fit: cover; border: 2px solid #3b82f6; transform: scaleX(-1); z-index: 60; }

        /* CHAT NO MEIO - OCUPA O RESTO */
        #chat-section { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; overflow: hidden; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }

        /* BARRA DE DIGITAÇÃO - SEMPRE VISÍVEL NO FUNDO */
        #input-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 70px; background: #1a1a1a; padding: 10px; display: flex; items-center; gap: 8px; border-top: 1px solid #333; z-index: 100; }
        #msg-input { flex: 1; background: #2a2a2a; border-radius: 25px; padding: 12px 18px; color: #fff; border: none; font-size: 14px; outline: none; }

        /* MENSAGENS */
        .msg-row { display: flex; gap: 8px; max-width: 85%; }
        .msg-me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-box { padding: 10px 14px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .msg-me .msg-box { background: #005c4b; border-bottom-right-radius: 2px; }
        .msg-friend .msg-box { background: #202c33; border-bottom-left-radius: 2px; }
        .msg-photo { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; align-self: flex-end; }
        
        /* WINKS GIGANTES */
        #wink-layer { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; pointer-events: none; }
        .wink-anim { animation: msnWink 3s ease-in-out forwards; width: 65%; }
        @keyframes msnWink { 0% { transform: scale(0); opacity: 0; } 20% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }

        .drawer { position: absolute; bottom: 75px; left: 10px; right: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 15px; z-index: 150; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="wink-layer"><img id="wink-img" src="" class="wink-anim"></div>

    <section id="video-section">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
    </section>

    <main id="chat-section">
        <div class="p-2 border-b border-zinc-900 flex justify-between items-center bg-zinc-900/30">
            <select id="lang-select" class="bg-transparent text-[10px] font-bold text-blue-400 outline-none uppercase">
                <option value="pt">PORTUGUÊS</option><option value="es">ESPANHOL</option>
                <option value="ru">RUSSO</option><option value="tl">FILIPINO</option>
                <option value="en" selected>INGLÊS</option><option value="zh-TW">CHINÊS (T)</option>
                <option value="uk">UCRANIANO</option>
            </select>
            <p id="typing-ui" class="text-[9px] text-blue-500 hidden animate-pulse font-bold uppercase">Digitando...</p>
        </div>

        <div id="messages" class="no-scrollbar"></div>

        <div id="extra-panel" class="drawer hidden">
            <div class="grid grid-cols-2 gap-3 mb-4 text-[10px] font-bold">
                <button onclick="sendWink('kiss')" class="bg-zinc-800 p-3 rounded-xl">💋 BEIJO</button>
                <button onclick="sendWink('heart')" class="bg-zinc-800 p-3 rounded-xl">❤️ CORAÇÃO</button>
            </div>
            <div id="emoji-list" class="flex flex-wrap gap-2 text-2xl justify-center"></div>
        </div>

        <div id="input-bar">
            <button onclick="toggleExtra()" class="text-2xl">😊</button>
            <label class="text-xl cursor-pointer">📎<input type="file" id="img-in" class="hidden" accept="image/*" onchange="sendImg(this)"></label>
            <input id="msg-input" type="text" placeholder="Mensagem..." oninput="isTyping()">
            <button id="mic-btn" onmousedown="startV()" onmouseup="stopV()" ontouchstart="startV()" ontouchend="stopV()" class="text-xl text-red-500">🎙️</button>
            <button onclick="sendMsg()" class="bg-blue-600 w-11 h-11 rounded-full flex items-center justify-center shadow-lg">➤</button>
        </div>
    </main>

    <div id="login" class="fixed inset-0 bg-black z-[300] flex items-center justify-center p-6">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-zinc-800 text-center shadow-2xl">
            <h2 class="text-blue-500 font-black italic text-xl mb-4">BARROS CONNECT</h2>
            <input id="my-name" class="w-full bg-black p-4 rounded-xl mb-3 border border-zinc-800 outline-none text-sm" placeholder="Seu Nome">
            <input type="file" id="photo-in" class="hidden" onchange="loadP(this)">
            <label for="photo-in" class="block bg-zinc-800 p-3 rounded-xl mb-4 text-[10px] font-bold cursor-pointer border border-zinc-700">ESCOLHER FOTO</label>
            <div id="my-id" class="bg-black p-3 rounded-xl mb-4 text-blue-400 font-mono text-[10px] break-all border border-zinc-800 cursor-pointer" onclick="copyID()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-800 outline-none text-center" placeholder="ID DA AMIGA">
            <button onclick="start()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-blue-900/30">CONECTAR</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream, myPhoto, myName, mediaRecorder, audioChunks = [], recognition, transcribed = "";
        const emojis = ["😀","😂","😍","🤔","😢","👍","❤️","🔥","✨","🙏","👋","🤣"];

        emojis.forEach(e => document.getElementById('emoji-list').innerHTML += `<span onclick="addEmoji('${e}')" class="cursor-pointer">${e}</span>`);
        function addEmoji(e) { document.getElementById('msg-input').value += e; }
        function toggleExtra() { document.getElementById('extra-panel').classList.toggle('hidden'); }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) { recognition = new Speech(); recognition.lang = 'pt-BR'; recognition.onresult = (e) => transcribed = e.results[0][0].transcript; }

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s; document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id').innerText = id);
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        });
        peer.on('connection', c => { conn = c; initChat(); });

        function loadP(i) { const r = new FileReader(); r.onload = (e) => myPhoto = e.target.result; r.readAsDataURL(i.files[0]); }
        
        function start() {
            myName = document.getElementById('my-name').value;
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            peer.call(tid, localStream).on('stream', s => document.getElementById('remote-video').srcObject = s);
            conn = peer.connect(tid); initChat();
        }

        function initChat() {
            document.getElementById('login').style.display = 'none';
            conn.on('open', () => conn.send({type: 'profile', name: myName, photo: myPhoto}));
            conn.on('data', d => {
                if(d.type === 'profile') { localStorage.setItem('f_p', d.photo); }
                else if(d.type === 'typing') showTyping();
                else if(d.type === 'wink') playWink(d.kind);
                else if(d.type === 'msg') addMsg(d.orig, d.trans, 'friend', d.audio, d.img);
            });
        }

        function isTyping() { if(conn) conn.send({type: 'typing'}); }
        function showTyping() {
            const ui = document.getElementById('typing-ui'); ui.classList.remove('hidden');
            clearTimeout(window.tT); window.tT = setTimeout(() => ui.classList.add('hidden'), 2000);
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input');
            const l = document.getElementById('lang-select').value;
            if(!i.value) return;
            const tr = await translate(i.value, l);
            if(conn) conn.send({type: 'msg', orig: i.value, trans: tr});
            addMsg(i.value, tr, 'me'); i.value = '';
        }

        async function startV() {
            transcribed = ""; audioChunks = []; if(recognition) recognition.start();
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRecorder = new MediaRecorder(s);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const b = new Blob(audioChunks, {type:'audio/mp3'});
                const r = new FileReader();
                r.onload = async () => {
                    const l = document.getElementById('lang-select').value;
                    const tr = await translate(transcribed || "...", l);
                    if(conn) conn.send({type: 'msg', audio: r.result, orig: transcribed, trans: tr});
                    addMsg(transcribed, tr, 'me', r.result);
                };
                r.readAsDataURL(b);
            };
            mediaRecorder.start();
        }
        function stopV() { if(recognition) recognition.stop(); if(mediaRecorder) mediaRecorder.stop(); }

        function sendImg(i) {
            const r = new FileReader(); r.onload = (e) => {
                if(conn) conn.send({type: 'msg', img: e.target.result});
                addMsg('', '', 'me', null, e.target.result);
            }; r.readAsDataURL(i.files[0]);
        }

        async function translate(t, l) {
            try {
                const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(t)}&langpair=pt|${l}`);
                const j = await r.json(); return j.responseData.translatedText;
            } catch { return t; }
        }

        function addMsg(o, t, s, au = null, im = null) {
            const b = document.getElementById('messages');
            const isMe = s === 'me';
            const ph = isMe ? myPhoto : localStorage.getItem('f_p');
            let h = "";
            if(im) h += `<img src="${im}" class="rounded-xl mb-2 max-w-full">`;
            if(au) h += `<audio src="${au}" controls class="w-full h-8 mb-2 filter invert"></audio>`;
            if(t) h += `<p class="font-bold text-sm">${t}</p><p class="text-[9px] opacity-40 italic mt-1">${o}</p>`;
            
            b.innerHTML += `<div class="msg-row ${isMe?'msg-me':'msg-friend'}">
                <img src="${ph || ''}" class="msg-photo">
                <div class="msg-box shadow-lg">${h}</div>
            </div>`;
            b.scrollTop = b.scrollHeight;
        }

        function sendWink(k) { if(conn) conn.send({type: 'wink', kind: k}); playWink(k); }
        function playWink(k) {
            const img = document.getElementById('wink-img');
            img.src = k === 'kiss' ? "https://media.giphy.com/media/3o7TKLv3fDYLxH8hW0/giphy.gif" : "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHR0OHI1Znd6bmZ6Znd6bmZ6Znd6bmZ6Znd6bmZ6Znd6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v0OOn2Z7906V5S63v2/giphy.gif";
            document.getElementById('wink-layer').style.display = 'flex';
            new Audio(k === 'kiss' ? "https://www.myinstants.com/media/sounds/kiss-sound-effect.mp3" : "https://www.myinstants.com/media/sounds/heart-beat-sound-effect.mp3").play();
            setTimeout(() => document.getElementById('wink-layer').style.display = 'none', 3000);
        }

        function copyID() { navigator.clipboard.writeText(document.getElementById('my-id').innerText); alert("ID Copiado!"); }
    </script>
</body>
</html>
