<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Estável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #video-container { position: relative; width: 100%; height: 45vh; background: #111; border-bottom: 2px solid #333; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { position: absolute; bottom: 10px; right: 10px; width: 90px; height: 130px; border-radius: 12px; border: 2px solid #3b82f6; object-fit: cover; transform: scaleX(-1); z-index: 50; }
        #chat { flex: 1; background: #0a0a0a; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .m-me { align-self: flex-end; background: #005c4b; }
        .m-fr { align-self: flex-start; background: #202c33; }
        #input-area { padding: 10px; background: #1a1a1a; display: flex; gap: 8px; align-items: center; }
        input { flex: 1; background: #2a2a2a; border-radius: 20px; padding: 10px 15px; border: none; color: #fff; outline: none; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <div id="input-area">
            <input id="txt" type="text" placeholder="Mensagem...">
            <button onclick="send()" class="bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center font-bold">➤</button>
        </div>
    </div>

    <div id="setup" class="fixed inset-0 bg-black z-[1000] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-blue-500 font-black text-2xl mb-8">BARROS CONNECT V4</h1>
        <div class="bg-zinc-900 p-6 rounded-[35px] w-full max-w-sm border border-zinc-800">
            <p class="text-[10px] text-zinc-500 mb-2 uppercase tracking-widest">O Teu ID:</p>
            <div id="my-id" class="bg-black p-4 rounded-xl mb-6 text-blue-400 font-mono text-xs break-all border border-zinc-700 cursor-pointer">A carregar...</div>
            <input id="friend-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-700 outline-none text-center" placeholder="COLAR ID DO PARCEIRO">
            <button onclick="startCall()" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase tracking-widest">Ligar Agora</button>
            <p id="status" class="mt-4 text-[10px] text-yellow-500 font-bold uppercase"></p>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream;
        const status = document.getElementById('status');

        // 1. ACESSO À CÂMARA
        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('local-video').srcObject = localStream;
                status.innerText = "Câmara pronta!";
            } catch (e) {
                status.innerText = "Erro: Ativa a câmara nas definições!";
                console.error(e);
            }
        }
        initCamera();

        // 2. RECEBER ID
        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('my-id').onclick = () => {
                navigator.clipboard.writeText(id);
                alert("ID Copiado!");
            };
        });

        // 3. RECEBER CHAMADA (Telemóvel recebe do PC ou vice-versa)
        peer.on('call', call => {
            status.innerText = "A receber chamada...";
            call.answer(localStream);
            call.on('stream', s => {
                document.getElementById('remote-video').srcObject = s;
                document.getElementById('setup').style.display = 'none';
            });
        });

        peer.on('connection', c => {
            conn = c;
            setupChat();
            document.getElementById('setup').style.display = 'none';
        });

        // 4. INICIAR CHAMADA
        function startCall() {
            const fid = document.getElementById('friend-id').value;
            if(!fid) return alert("Copia o ID da outra pessoa!");

            status.innerText = "A ligar...";
            
            // Ligar Vídeo
            const call = peer.call(fid, localStream);
            call.on('stream', s => {
                document.getElementById('remote-video').srcObject = s;
                document.getElementById('setup').style.display = 'none';
            });

            // Ligar Chat
            conn = peer.connect(fid);
            setupChat();
        }

        function setupChat() {
            conn.on('data', data => {
                if(data.type === 'text') addMsg(data.val, 'fr');
            });
        }

        function send() {
            const val = document.getElementById('txt').value;
            if(!val || !conn) return;
            conn.send({type: 'text', val: val});
            addMsg(val, 'me');
            document.getElementById('txt').value = '';
        }

        function addMsg(t, s) {
            const box = document.getElementById('messages');
            box.innerHTML += `<div class="m ${s === 'me' ? 'm-me' : 'm-fr'}">${t}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
