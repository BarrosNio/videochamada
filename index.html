<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Final Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #eee;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* VÍDEO COMPACTO (Ajustado para o chat brilhar) */
        #video-section {
            position: relative;
            width: 100%;
            height: 160px;
            background: #111;
            flex-shrink: 0;
            border-bottom: 1px solid #27272a;
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #local-video {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 45px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #3b82f6;
            z-index: 50;
            transform: scaleX(-1);
        }

        /* CHAT AMPLO (Ocupa o máximo de espaço) */
        #chat-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 80px;
        }

        /* GAVETAS FLUTUANTES */
        .drawer {
            position: absolute;
            bottom: 65px;
            left: 0;
            right: 0;
            background: #1c1c1f;
            border-top: 1px solid #3f3f46;
            padding: 15px;
            z-index: 100;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -15px 30px rgba(0, 0, 0, 0.8);
        }

        #wink-layer {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .wink-animation {
            animation: msnWink 3s ease-in-out forwards;
            width: 55%;
        }

        @keyframes msnWink {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            20% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        /* Scroll invisível */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @media (min-width: 768px) {
            body {
                flex-direction: row;
            }

            #video-section {
                height: 100vh;
                flex-grow: 1;
            }

            #chat-section {
                width: 330px;
                height: 100vh;
                border-left: 1px solid #27272a;
            }
        }
    </style>
</head>

<body>

    <div id="wink-layer"><img id="wink-img" src="" class="wink-animation"></div>

    <section id="video-section">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>

        <div id="conn-modal"
            class="absolute inset-0 bg-black/95 flex items-center justify-center z-[150] p-6 text-center">
            <div class="bg-zinc-900 p-8 rounded-[40px] border border-zinc-800 w-full max-w-xs shadow-2xl">
                <h2 class="text-blue-500 font-black mb-1 italic text-xl tracking-tighter">BARROS CONNECT</h2>
                <p class="text-[9px] text-zinc-500 mb-6 uppercase tracking-widest">Conexão Global</p>

                <div class="mb-6">
                    <p class="text-[8px] text-zinc-400 mb-2">SEU ID (TOQUE PARA COPIAR)</p>
                    <div id="peer-id" onclick="copyID()"
                        class="bg-black p-4 rounded-2xl text-blue-400 font-mono text-xs cursor-pointer border border-zinc-800 active:scale-95 transition-transform italic">
                        GERANDO ID...</div>
                </div>

                <input id="target-id" type="text"
                    class="w-full bg-black p-4 rounded-2xl mb-4 text-center border border-zinc-700 text-sm outline-none text-white focus:border-blue-500 transition-colors"
                    placeholder="ID DO AMIGO">

                <button onclick="startConnection()"
                    class="w-full bg-blue-600 p-4 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-blue-900/30 active:bg-blue-700">ENTRAR
                    NO CHAT</button>
                <p class="text-[8px] text-zinc-600 mt-4 uppercase">Aguarde o ID carregar antes de conectar</p>
            </div>
        </div>

        <div id="video-share-container" class="hidden absolute inset-0 z-40 bg-black">
            <iframe id="shared-iframe" class="w-full h-full border-none" allow="autoplay"></iframe>
            <button onclick="closeVideo()"
                class="absolute top-4 right-4 bg-red-600 px-4 py-2 rounded-full text-[10px] font-bold">FECHAR
                VÍDEO</button>
        </div>
    </section>

    <aside id="chat-section">
        <div class="p-3 border-b border-zinc-900 flex justify-between items-center bg-zinc-900/40 backdrop-blur-sm">
            <select id="lang-select"
                class="bg-transparent text-[10px] font-black text-blue-500 outline-none uppercase tracking-tighter">
                <option value="pt">PORTUGUÊS</option>
                <option value="en">INGLÊS</option>
                <option value="es">ESPANHOL</option>
                <option value="zh-CN">CHINÊS (S)</option>
                <option value="zh-TW">CHINÊS (T)</option>
                <option value="ru">RUSSO</option>
                <option value="uk">UCRÂNIA</option>
                <option value="tl">FILIPINO</option>
                <option value="ja">JAPONÊS</option>
            </select>
            <div class="flex gap-2 items-center">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] text-zinc-400 font-bold uppercase">Online</span>
            </div>
        </div>

        <div id="chat-messages" class="no-scrollbar">
            <div class="flex flex-col items-center my-10 opacity-20">
                <p class="text-[10px] uppercase font-bold tracking-[0.2em]">As mensagens aparecerão aqui</p>
            </div>
        </div>

        <div id="extra-panel" class="drawer hidden">
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="sendWink('kiss')"
                    class="bg-zinc-800 py-3 rounded-xl text-[10px] font-black active:scale-95 transition-transform">💋
                    BEIJO</button>
                <button onclick="sendWink('knock')"
                    class="bg-zinc-800 py-3 rounded-xl text-[10px] font-black active:scale-95 transition-transform">✊
                    TOC-TOC</button>
                <button onclick="sendWink('butt')"
                    class="bg-zinc-800 py-3 rounded-xl text-[10px] font-black active:scale-95 transition-transform">🍑
                    BUNDA</button>
            </div>
            <div id="emoji-list" class="flex flex-wrap gap-2 max-h-40 overflow-y-auto no-scrollbar justify-center">
            </div>
        </div>

        <div id="media-input-box" class="drawer hidden">
            <p class="text-[10px] font-bold text-zinc-500 mb-3 uppercase text-center">Compartilhar Link</p>
            <input id="media-url" type="text" placeholder="Cole Link YouTube ou MP3"
                class="w-full bg-black p-4 rounded-2xl text-xs outline-none border border-zinc-800 mb-4 text-white">
            <div class="flex gap-2">
                <button onclick="sendMedia('video')"
                    class="flex-1 bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-900/20">VÍDEO
                    📺</button>
                <button onclick="sendMedia('audio')"
                    class="flex-1 bg-purple-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-purple-900/20">MÚSICA
                    ♫</button>
            </div>
        </div>

        <div
            class="p-3 bg-zinc-950 flex items-center gap-3 border-t border-zinc-900 absolute bottom-0 left-0 right-0 h-16">
            <button onclick="toggleExtra()"
                class="text-2xl opacity-70 active:opacity-100 transition-opacity">😊</button>
            <button onclick="toggleMediaInput()"
                class="text-2xl opacity-70 active:opacity-100 transition-opacity">🔗</button>
            <input id="msg-input" type="text"
                class="flex-1 bg-zinc-900 p-3 rounded-2xl outline-none text-sm text-white border border-zinc-800 focus:border-blue-500"
                placeholder="Digite algo...">
            <button onclick="sendMsg()"
                class="bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition-transform">➤</button>
        </div>
    </aside>

    <script>
        const peer = new Peer();
        let conn, localStream;
        const SOUNDS = { kiss: "https://www.myinstants.com/media/sounds/kiss-sound-effect.mp3", knock: "https://www.myinstants.com/media/sounds/knock-knock.mp3", butt: "https://www.myinstants.com/media/sounds/cartoon-boing.mp3" };
        const GIFS = { kiss: "https://media.giphy.com/media/3o7TKLv3fDYLxH8hW0/giphy.gif", knock: "https://media.giphy.com/media/3o7TKVUn7XYM6mfuCs/giphy.gif", butt: "https://media.giphy.com/media/l41lTfOR5X9m7Wv8k/giphy.gif" };
        const allEmojis = ["😀", "😃", "😄", "😁", "😆", "😅", "😂", "🤣", "😊", "😇", "🙂", "🙃", "😉", "😌", "😍", "🥰", "😘", "😗", "😙", "😚", "😋", "😛", "😝", "😜", "🤪", "🤨", "🧐", "😎", "🤩", "😏", "😒", "😞", "😔", "😟", "😕", "🙁", "😣", "😖", "😫", "😩", "🥺", "😢", "😭", "😤", "😠", "😡", "🤬", "🤯", "😳", "🥵", "🥶", "😱", "😨", "😰", "😥", "😓", "🤗", "🤔", "🤭", "🤫", "🤥", "😶", "😐", "😑", "😬", "🙄", "😯", "😦", "😧", "😮", "😲", "🥱", "😴", "🤤", "😪", "😵", "🤐", "🥴", "🤢", "🤮", "🤧", "😷", "🤒", "🤕", "🤑", "🤠", "😈", "👿", "👹", "👺", "🤡", "👻", "💀", "👽", "👾", "🤖", "🎃", "😺", "😸", "😹", "😻", "😼", "😽", "🙀", "😿", "😾", "❤️", "🧡", "💛", "💚", "💙", "💜", "🖤", "🤍", "💔", "💕", "💞", "💓", "💗", "💖", "💘", "💝", "💟", "👋", "👌", "👍", "👎", "✊", "👊", "👏", "🙌", "👐", "🙏", "💪"];

        function renderEmojis() {
            const list = document.getElementById('emoji-list');
            allEmojis.forEach(e => { list.innerHTML += `<span class="p-2 text-2xl active:scale-125 transition-transform" onclick="addEmoji('${e}')">${e}</span>`; });
        }
        function addEmoji(e) { document.getElementById('msg-input').value += e; }
        renderEmojis();

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => {
            localStream = s;
            document.getElementById('local-video').srcObject = s;
        }).catch(err => console.log("Câmera não permitida ou indisponível"));

        peer.on('open', id => document.getElementById('peer-id').innerText = id);
        peer.on('connection', c => { conn = c; setupConn(); document.getElementById('conn-modal').style.display = 'none'; });
        peer.on('call', call => { call.answer(localStream); call.on('stream', s => document.getElementById('remote-video').srcObject = s); });

        function startConnection() {
            const id = document.getElementById('target-id').value;
            // Libera a tela mesmo sem ID para teste visual
            if (!id) {
                document.getElementById('conn-modal').style.display = 'none';
                return;
            }
            conn = peer.connect(id);
            setupConn();
            peer.call(id, localStream).on('stream', s => document.getElementById('remote-video').srcObject = s);
            document.getElementById('conn-modal').style.display = 'none';
        }

        function setupConn() {
            conn.on('data', data => {
                if (data.type === 'wink') receiveWink(data.kind);
                else if (data.type === 'video') playSharedVideo(data.url);
                else addMessage(data.text, data.trans, 'Amigo');
            });
        }

        function toggleMediaInput() { document.getElementById('media-input-box').classList.toggle('hidden'); document.getElementById('extra-panel').classList.add('hidden'); }
        function toggleExtra() { document.getElementById('extra-panel').classList.toggle('hidden'); document.getElementById('media-input-box').classList.add('hidden'); }

        function sendMedia(type) {
            const url = document.getElementById('media-url').value;
            if (!url) return;
            if (conn) conn.send({ type: type, url: url });
            if (type === 'video') playSharedVideo(url);
            toggleMediaInput();
        }

        function playSharedVideo(url) {
            const container = document.getElementById('video-share-container');
            const iframe = document.getElementById('shared-iframe');
            container.classList.remove('hidden');
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const vid = url.split('v=')[1] || url.split('/').pop().split('?')[0];
                iframe.src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            } else {
                iframe.src = url;
            }
        }

        function closeVideo() { document.getElementById('video-share-container').classList.add('hidden'); document.getElementById('shared-iframe').src = ""; }

        function sendWink(kind) { if (conn) conn.send({ type: 'wink', kind: kind }); receiveWink(kind); toggleExtra(); }

        function receiveWink(kind) {
            new Audio(SOUNDS[kind]).play();
            const img = document.getElementById('wink-img');
            img.src = GIFS[kind];
            document.getElementById('wink-layer').style.display = 'flex';
            img.className = 'wink-animation';
            setTimeout(() => { document.getElementById('wink-layer').style.display = 'none'; }, 3000);
        }

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const lang = document.getElementById('lang-select').value;
            if (!input.value) return;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input.value)}&langpair=pt|${lang}`);
                const json = await res.json();
                const trans = json.responseData.translatedText;
                if (conn) conn.send({ text: input.value, trans: trans });
                addMessage(input.value, trans, 'Você');
            } catch {
                addMessage(input.value, input.value, 'Você');
            }
            input.value = '';
        }

        function addMessage(orig, trans, sender) {
            const box = document.getElementById('chat-messages');
            const isMe = sender === 'Você';
            box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4">
                <div class="${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-100'} p-4 rounded-[22px] max-w-[85%] shadow-lg border border-white/5">
                    <p class="text-[7px] opacity-50 uppercase mb-1 font-black tracking-widest">${orig}</p>
                    <p class="text-sm font-medium leading-relaxed">${trans}</p>
                </div>
            </div>`;
            box.scrollTop = box.scrollHeight;
        }

        function copyID() {
            const id = document.getElementById('peer-id').innerText;
            if (id === "GERANDO ID...") return;
            navigator.clipboard.writeText(id);
            alert("ID Copiado! Mande para seu amigo.");
        }
    </script>
</body>

</html>
