<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Waplog Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        /* VÍDEO REMOTO (FUNDO TOTAL) */
        #remote-video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 5;
            background: #111;
        }

        /* SEU VÍDEO (BALÃO FLUTUANTE) */
        #local-video {
            position: fixed; top: 20px; right: 20px;
            width: 90px; height: 130px;
            border-radius: 15px; object-fit: cover;
            border: 2px solid rgba(255,255,255,0.4);
            z-index: 100; transform: scaleX(-1);
        }

        /* INTERFACE DO CHAT (SOBREPOSIÇÃO) */
        #interface {
            position: fixed; inset: 0;
            z-index: 50; display: flex;
            flex-direction: column; justify-content: flex-end;
            pointer-events: none;
        }

        #messages {
            padding: 20px; display: flex;
            flex-direction: column; gap: 8px;
            max-height: 45%; overflow-y: auto;
            pointer-events: auto;
        }

        .bubble {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 18px;
            color: white; font-size: 14px;
            max-width: 75%; align-self: flex-start;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .bubble-me { background: rgba(37, 99, 235, 0.6); align-self: flex-end; }

        /* BARRA DE BAIXO */
        #bottom-bar {
            padding: 15px; display: flex; align-items: center;
            gap: 12px; pointer-events: auto;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .input-wrap {
            flex: 1; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px); border-radius: 30px;
            padding: 2px 15px; display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #msg-input {
            flex: 1; background: transparent; border: none;
            color: white; padding: 10px; outline: none; font-size: 16px;
        }

        #login {
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center;
            justify-content: center; padding: 20px;
        }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline muted></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div id="interface">
        <div id="messages"></div>
        <div id="bottom-bar">
            <div class="input-wrap">
                <select id="lang" class="bg-transparent text-white text-[10px] mr-2 outline-none">
                    <option value="en">EN</option><option value="pt">PT</option><option value="ru">RU</option>
                </select>
                <input id="msg-input" type="text" placeholder="Envie uma mensagem...">
            </div>
            <button onclick="sendMsg()" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white text-xl shadow-lg">➤</button>
        </div>
    </div>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-zinc-800 text-center">
            <h2 class="text-blue-500 font-bold text-xl mb-6">BARROS CONNECT</h2>
            <div id="my-id" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] break-all" onclick="copyID()">GERANDO...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-800 text-white text-center" placeholder="ID DO PARCEIRO">
            <button onclick="connect()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold">CONECTAR</button>
        </div>
    </div>

    <script>
        const peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});
        let conn, localStream;

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s; document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('call', call => {
            call.answer(localStream);
            setupRemoteVideo(call);
        });

        peer.on('connection', c => { conn = c; setupChat(); });

        function connect() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            const call = peer.call(tid, localStream);
            setupRemoteVideo(call);
            conn = peer.connect(tid);
            setupChat();
        }

        function setupRemoteVideo(call) {
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s;
                rv.muted = false; // Desmuta após o sinal chegar
                rv.play();
                document.getElementById('login').style.display = 'none';
            });
        }

        function setupChat() {
            document.getElementById('login').style.display = 'none';
            conn.on('data', d => {
                if(d.type === 'msg') addBubble(d.orig, d.trans, false);
            });
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input'), l = document.getElementById('lang').value;
            if(!i.value) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await res.json();
            const tr = j.responseData.translatedText;
            if(conn) conn.send({type: 'msg', orig: i.value, trans: tr});
            addBubble(i.value, tr, true);
            i.value = '';
        }

        function addBubble(o, t, isMe) {
            const m = document.getElementById('messages');
            m.innerHTML += `<div class="bubble ${isMe ? 'bubble-me' : ''}">
                <p class="text-[10px] opacity-50">${o}</p>
                <p class="font-semibold">${t}</p>
            </div>`;
            m.scrollTop = m.scrollHeight;
        }

        function copyID() { navigator.clipboard.writeText(document.getElementById('my-id').innerText); alert("ID Copiado!"); }
    </script>
</body>
</html>
