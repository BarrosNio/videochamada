<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Final</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; color: white; }

        /* VÍDEO FUNDO */
        #remote-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #000; }
        #local-video { position: fixed; top: 15px; right: 15px; width: 80px; height: 110px; border-radius: 12px; object-fit: cover; border: 2px solid #3b82f6; z-index: 100; transform: scaleX(-1); }

        /* CAMADA DO CHAT (Sempre por cima) */
        #ui-container { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; pointer-events: none; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; padding-bottom: 100px; justify-content: flex-end; }
        
        .bubble { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); padding: 10px 15px; border-radius: 20px; max-width: 85%; border: 1px solid rgba(255,255,255,0.1); }
        .bubble-me { align-self: flex-end; background: rgba(30, 64, 175, 0.8); }

        /* BARRA DE COMANDO */
        #input-area { background: rgba(15, 15, 15, 0.95); padding: 12px; display: flex; align-items: center; gap: 8px; pointer-events: auto; z-index: 110; border-top: 1px solid #333; }
        .input-wrap { flex: 1; background: #2a2a2a; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #msg-in { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }

        /* WINKS */
        #wink-layer { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; pointer-events: none; }
        
        /* LOGIN */
        #login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items-center; justify-content: center; p: 20px; pointer-events: auto; }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline muted></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div id="ui-container">
        <div class="p-4 pointer-events-auto">
            <select id="lang" class="bg-black/80 text-white text-[10px] p-2 rounded-lg border border-white/20">
                <option value="en" selected>INGLÊS</option>
                <option value="pt">PORTUGUÊS</option>
                <option value="es">ESPANHOL</option>
                <option value="ru">RUSSO</option>
            </select>
        </div>

        <div id="messages"></div>

        <div id="input-area">
            <button onclick="sendWink()" class="text-2xl">💋</button>
            <label class="text-2xl cursor-pointer">📎<input type="file" class="hidden" accept="image/*" onchange="up('img', this)"></label>
            <label class="text-2xl cursor-pointer">🎵<input type="file" class="hidden" accept="audio/*" onchange="up('mus', this)"></label>
            <div class="input-wrap">
                <input id="msg-in" type="text" placeholder="Diga algo...">
            </div>
            <button onclick="sendMsg()" class="bg-blue-600 w-11 h-11 rounded-full flex items-center justify-center font-bold">➤</button>
        </div>
    </div>

    <div id="wink-layer"><img id="wink-img" class="w-3/4"></div>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs text-center border border-zinc-800">
            <h1 class="text-blue-500 font-bold text-xl mb-4">BARROS CONNECT</h1>
            <div id="my-id" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] break-all border border-zinc-800 cursor-pointer" onclick="copy()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 text-white text-center border border-zinc-800 outline-none" placeholder="ID DA AMIGA">
            <button onclick="start()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase">CONECTAR</button>
        </div>
    </div>

    <script>
        const peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});
        let conn, localStream;

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s; document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => { 
                const rv = document.getElementById('remote-video');
                rv.srcObject = s; rv.muted = false; rv.play();
                document.getElementById('login').style.display = 'none';
            });
        });

        peer.on('connection', c => { conn = c; setup(); });

        function start() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            peer.call(tid, localStream).on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s; rv.muted = false; rv.play();
            });
            conn = peer.connect(tid); setup();
        }

        function setup() {
            document.getElementById('login').style.display = 'none';
            conn.on('data', d => {
                if(d.type === 'wink') playWink();
                else addBubble(d.orig, d.trans, false, d.img, d.mus);
            });
        }

        async function sendMsg() {
            const i = document.getElementById('msg-in'), l = document.getElementById('lang').value;
            if(!i.value || !conn) return;
            const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await r.json();
            const tr = j.responseData.translatedText;
            conn.send({orig: i.value, trans: tr});
            addBubble(i.value, tr, true);
            i.value = '';
        }

        function up(type, input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = {img: type==='img'?e.target.result:null, mus: type==='mus'?e.target.result:null};
                conn.send(data); addBubble('', '', true, data.img, data.mus);
            };
            reader.readAsDataURL(input.files[0]);
        }

        function addBubble(o, t, me, img, mus) {
            const box = document.getElementById('messages');
            let h = "";
            if(img) h += `<img src="${img}" class="rounded-lg max-w-full">`;
            if(mus) h += `<audio src="${mus}" controls class="w-full filter invert h-8"></audio>`;
            if(t) h += `<p class="text-[9px] opacity-50">${o}</p><p class="text-sm font-bold">${t}</p>`;
            box.innerHTML += `<div class="bubble ${me?'bubble-me':''}">${h}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function sendWink() { if(conn) conn.send({type:'wink'}); playWink(); }
        function playWink() {
            const l = document.getElementById('wink-layer');
            document.getElementById('wink-img').src = "https://media.giphy.com/media/3o7TKLv3fDYLxH8hW0/giphy.gif";
            l.style.display = 'flex';
            new Audio("https://www.myinstants.com/media/sounds/kiss-sound-effect.mp3").play();
            setTimeout(() => l.style.display = 'none', 3000);
        }

        function copy() { navigator.clipboard.writeText(document.getElementById('my-id').innerText); alert("Copiado!"); }
    </script>
</body>
</html>
