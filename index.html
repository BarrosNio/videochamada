<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Comunicação Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; background: #000; font-family: sans-serif; overflow: hidden; }

        /* VÍDEO FUNDO */
        #remote-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #111; }
        
        /* SEU VÍDEO */
        #local-video { position: fixed; top: 20px; right: 20px; width: 85px; height: 120px; border-radius: 12px; object-fit: cover; border: 2px solid #3b82f6; z-index: 100; transform: scaleX(-1); }

        /* INTERFACE */
        #ui { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; pointer-events: none; }
        
        #messages { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; pointer-events: auto; justify-content: flex-end; }
        
        .bubble { background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 20px; color: white; max-width: 80%; align-self: flex-start; pointer-events: auto; }
        .bubble-me { align-self: flex-end; background: rgba(30, 64, 175, 0.8); }

        /* BARRA DE BAIXO */
        #bar { padding: 15px; display: flex; gap: 10px; align-items: center; background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: auto; }
        #msg-in { flex: 1; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; padding: 12px 20px; color: white; outline: none; font-size: 16px; }

        #login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items-center; justify-content: center; p: 20px; pointer-events: auto; }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div id="ui">
        <div class="p-4 pointer-events-auto">
            <select id="lang" class="bg-black/60 text-white text-[11px] p-2 rounded-full border border-white/20">
                <option value="en" selected>INGLÊS</option>
                <option value="es">ESPANHOL</option>
                <option value="ru">RUSSO</option>
                <option value="pt">PORTUGUÊS</option>
            </select>
        </div>

        <div id="messages"></div>

        <div id="bar">
            <input id="msg-in" type="text" placeholder="Escreva aqui...">
            <button onclick="send()" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-xl font-bold">➤</button>
        </div>
    </div>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-zinc-800 text-center shadow-2xl">
            <h2 class="text-blue-500 font-black italic text-xl mb-6">BARROS CONNECT</h2>
            <div id="my-id-ui" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] border border-zinc-800 break-all cursor-pointer" onclick="copy()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-800 text-white text-center outline-none" placeholder="ID DO AMIGO">
            <button onclick="start()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase shadow-lg shadow-blue-900/40">CONECTAR AGORA</button>
        </div>
    </div>

    <script>
        // SERVIDORES DO GOOGLE PARA GARANTIR CONEXÃO NO 4G
        const peer = new Peer({
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }]}
        });

        let conn, localStream;

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s;
            document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id-ui').innerText = id);

        // RECEBER LIGAÇÃO
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s;
                rv.play();
                document.getElementById('login').style.display = 'none';
            });
        });

        // RECEBER MENSAGEM
        peer.on('connection', c => {
            conn = c;
            conn.on('data', d => addBubble(d.orig, d.trans, false));
            document.getElementById('login').style.display = 'none';
        });

        function start() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;

            // Ligar Vídeo
            const call = peer.call(tid, localStream);
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s;
                rv.play();
                document.getElementById('login').style.display = 'none';
            });

            // Ligar Chat
            conn = peer.connect(tid);
            conn.on('data', d => addBubble(d.orig, d.trans, false));
        }

        async function send() {
            const i = document.getElementById('msg-in'), l = document.getElementById('lang').value;
            if(!i.value || !conn) return;
            
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await res.json();
            const tr = j.responseData.translatedText;
            
            conn.send({orig: i.value, trans: tr});
            addBubble(i.value, tr, true);
            i.value = '';
        }

        function addBubble(o, t, isMe) {
            const m = document.getElementById('messages');
            m.innerHTML += `<div class="bubble ${isMe?'bubble-me':''}">
                <p class="text-[9px] opacity-60">${o}</p>
                <p>${t}</p>
            </div>`;
            m.scrollTop = m.scrollHeight;
        }

        function copy() { navigator.clipboard.writeText(document.getElementById('my-id-ui').innerText); alert("ID Copiado!"); }
    </script>
</body>
</html>
