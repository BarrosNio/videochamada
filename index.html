<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Mobile Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #eee;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Ajuste de Vídeo */
        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
        }

        #local-video {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 80px;
            height: 110px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #3b82f6;
            z-index: 50;
            transform: scaleX(-1);
        }

        /* Camada de Winks */
        #wink-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .wink-animation {
            animation: msnWink 3s ease-in-out forwards;
            width: 80%;
        }

        @keyframes msnWink {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            20% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .shake {
            animation: shakeScreen 0.4s infinite;
        }

        @keyframes shakeScreen {
            0% {
                transform: translate(1px, 1px);
            }

            20% {
                transform: translate(-3px, 0px);
            }

            100% {
                transform: translate(0px, 0px);
            }
        }

        /* Custom Scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .emoji-item {
            cursor: pointer;
            font-size: 1.6rem;
            padding: 8px;
            display: inline-block;
            width: 45px;
            text-align: center;
        }
    </style>
</head>

<body class="flex flex-col md:flex-row">

    <div id="wink-layer"><img id="wink-img" src="" class="wink-animation"></div>

    <section
        class="relative w-full h-[40vh] md:h-screen md:flex-1 bg-zinc-900 border-b md:border-b-0 md:border-r border-zinc-800">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>

        <div id="conn-modal" class="absolute inset-0 bg-black/80 flex items-center justify-center z-[60] p-4">
            <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 w-full max-w-xs text-center">
                <h2 class="text-blue-500 font-black mb-2 italic">BARROS CONNECT</h2>
                <p class="text-[10px] text-zinc-500 mb-4 uppercase tracking-widest">Seu ID: <span id="peer-id"
                        class="text-white font-mono">...</span></p>
                <input id="target-id" type="text"
                    class="w-full bg-black p-3 rounded-xl mb-4 text-center border border-zinc-700 outline-none text-sm"
                    placeholder="ID do Parceiro">
                <button onclick="startConnection()"
                    class="w-full bg-blue-600 p-3 rounded-xl font-bold text-xs uppercase">Conectar</button>
            </div>
        </div>

        <div id="video-share-container" class="hidden absolute inset-0 z-40 bg-black flex items-center justify-center">
            <iframe id="shared-iframe" class="w-full h-full hidden" frameborder="0"></iframe>
            <video id="shared-video-player" controls class="w-full h-full hidden"></video>
            <button onclick="closeVideo()"
                class="absolute top-2 right-2 bg-red-600 px-3 py-1 rounded-full text-[10px] font-bold">FECHAR</button>
        </div>
    </section>

    <aside class="w-full h-[60vh] md:h-screen md:w-80 bg-zinc-950 flex flex-col relative">

        <div class="p-3 border-b border-zinc-900 flex items-center justify-between">
            <select id="lang-select"
                class="bg-transparent text-[10px] font-bold text-blue-400 outline-none border-none uppercase">
                <option value="pt">Português</option>
                <option value="en">Inglês</option>
                <option value="es">Espanhol</option>
                <option value="zh-CN">Chinês (S)</option>
                <option value="zh-TW">Chinês (T)</option>
                <option value="ru">Russo</option>
                <option value="uk">Ucrânia</option>
                <option value="tl">Filipino</option>
                <option value="ja">Japonês</option>
            </select>
            <span class="text-[9px] text-zinc-600 font-bold uppercase">Chat Tradutor</span>
        </div>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32"></div>

        <div id="extra-panel"
            class="hidden absolute bottom-16 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 z-50 max-h-[50%] overflow-y-auto rounded-t-3xl shadow-2xl">
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="sendWink('kiss')" class="bg-zinc-800 py-2 rounded-lg text-[10px] font-bold">💋
                    BEIJO</button>
                <button onclick="sendWink('knock')" class="bg-zinc-800 py-2 rounded-lg text-[10px] font-bold">✊
                    TOC-TOC</button>
                <button onclick="sendWink('butt')" class="bg-zinc-800 py-2 rounded-lg text-[10px] font-bold">🍑
                    BUNDA</button>
            </div>
            <div id="recent-container" class="mb-4 hidden border-t border-zinc-800 pt-2">
                <p class="text-[9px] font-bold text-blue-400 mb-2 uppercase">Favoritos</p>
                <div id="recent-list" class="flex flex-wrap gap-1"></div>
            </div>
            <div id="emoji-list" class="flex flex-wrap gap-1"></div>
        </div>

        <div id="media-input-box"
            class="hidden absolute bottom-16 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 z-50 rounded-t-3xl">
            <input id="media-url" type="text" placeholder="Cole Link YouTube/MP3"
                class="w-full bg-black p-3 rounded-xl text-xs outline-none border border-zinc-800 mb-3">
            <div class="flex gap-2">
                <button onclick="sendMedia('video')"
                    class="flex-1 bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Vídeo</button>
                <button onclick="sendMedia('audio')"
                    class="flex-1 bg-purple-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Música</button>
            </div>
            <audio id="shared-audio" controls class="hidden w-full mt-4 h-8"></audio>
        </div>

        <div
            class="absolute bottom-0 left-0 right-0 p-3 bg-black/90 backdrop-blur-md flex items-center gap-2 border-t border-zinc-900">
            <button onclick="toggleExtra()" class="p-2 text-xl grayscale hover:grayscale-0">😊</button>
            <button onclick="toggleMediaInput()" class="p-2 text-xl">🔗</button>
            <label class="p-2 text-xl cursor-pointer">📎<input id="file-input" type="file" class="hidden"
                    accept="image/*" onchange="sendFile(this)"></label>
            <input id="msg-input" type="text" class="flex-1 bg-zinc-900 p-3 rounded-2xl outline-none text-sm"
                placeholder="Oi...">
            <button onclick="sendMsg()"
                class="bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center text-white font-bold">➤</button>
        </div>
    </aside>

    <script>
        const peer = new Peer();
        let conn, localStream;
        const SOUNDS = { kiss: "https://www.myinstants.com/media/sounds/kiss-sound-effect.mp3", knock: "https://www.myinstants.com/media/sounds/knock-knock.mp3", butt: "https://www.myinstants.com/media/sounds/cartoon-boing.mp3" };
        const GIFS = { kiss: "https://media.giphy.com/media/3o7TKLv3fDYLxH8hW0/giphy.gif", knock: "https://media.giphy.com/media/3o7TKVUn7XYM6mfuCs/giphy.gif", butt: "https://media.giphy.com/media/l41lTfOR5X9m7Wv8k/giphy.gif" };
        const allEmojis = ["😀", "😃", "😄", "😁", "😆", "😅", "😂", "🤣", "😊", "😇", "🙂", "🙃", "😉", "😌", "😍", "🥰", "😘", "😗", "😙", "😚", "😋", "😛", "😝", "😜", "🤪", "🤨", "🧐", "😎", "🤩", "😏", "😒", "😞", "😔", "😟", "😕", "🙁", "😣", "😖", "😫", "😩", "🥺", "😢", "😭", "😤", "😠", "😡", "🤬", "🤯", "😳", "🥵", "🥶", "😱", "😨", "😰", "😥", "😓", "🤗", "🤔", "🤭", "🤫", "🤥", "😶", "😐", "😑", "😬", "🙄", "😯", "😦", "😧", "😮", "😲", "🥱", "😴", "🤤", "😪", "😵", "🤐", "🥴", "🤢", "🤮", "🤧", "😷", "🤒", "🤕", "🤑", "🤠", "😈", "👿", "👹", "👺", "🤡", "👻", "💀", "👽", "👾", "🤖", "🎃", "😺", "😸", "😹", "😻", "😼", "😽", "🙀", "😿", "😾", "❤️", "🧡", "💛", "💚", "💙", "💜", "🖤", "🤍", "💔", "💕", "💞", "💓", "💗", "💖", "💘", "💝", "💟", "👋", "🤚", "🖐️", "✋", "🖖", "👌", "✌️", "🤞", "🤟", "🤘", "🤙", "👈", "👉", "👆", "👇", "👍", "👎", "✊", "👊", "👏", "🙌", "👐", "🤝", "🙏", "💪", "🧠", "👀", "👁️", "👅", "👄"];

        let favorites = JSON.parse(localStorage.getItem('fav_emojis')) || [];

        function renderEmojis() {
            const list = document.getElementById('emoji-list');
            const recents = document.getElementById('recent-list');
            const recentContainer = document.getElementById('recent-container');
            list.innerHTML = "";
            allEmojis.forEach(e => { list.innerHTML += `<span class="emoji-item" onclick="addEmoji('${e}')">${e}</span>`; });
            if (favorites.length > 0) {
                recentContainer.classList.remove('hidden');
                recents.innerHTML = "";
                favorites.slice(0, 12).forEach(e => { recents.innerHTML += `<span class="emoji-item" onclick="addEmoji('${e}')">${e}</span>`; });
            }
        }

        function addEmoji(e) {
            document.getElementById('msg-input').value += e;
            favorites = [e, ...favorites.filter(item => item !== e)];
            localStorage.setItem('fav_emojis', JSON.stringify(favorites));
            renderEmojis();
        }

        renderEmojis();

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => {
            localStream = s;
            document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('peer-id').innerText = id);
        peer.on('connection', c => { conn = c; setupConn(); document.getElementById('conn-modal').style.display = 'none'; });
        peer.on('call', call => { call.answer(localStream); call.on('stream', s => document.getElementById('remote-video').srcObject = s); });

        function startConnection() {
            const id = document.getElementById('target-id').value;
            if (!id) return;
            conn = peer.connect(id); setupConn();
            peer.call(id, localStream).on('stream', s => document.getElementById('remote-video').srcObject = s);
            document.getElementById('conn-modal').style.display = 'none';
        }

        function setupConn() {
            conn.on('data', data => {
                if (data.type === 'wink') receiveWink(data.kind);
                else if (data.type === 'file') addMessage('', '', 'Amigo', data.data, true);
                else if (data.type === 'video') playSharedVideo(data.url);
                else if (data.type === 'audio') playSharedAudio(data.url);
                else addMessage(data.text, data.trans, 'Amigo');
            });
        }

        function toggleMediaInput() {
            document.getElementById('media-input-box').classList.toggle('hidden');
            document.getElementById('extra-panel').classList.add('hidden');
        }

        function toggleExtra() {
            document.getElementById('extra-panel').classList.toggle('hidden');
            document.getElementById('media-input-box').classList.add('hidden');
        }

        function sendMedia(type) {
            const url = document.getElementById('media-url').value;
            if (!url || !conn) return;
            conn.send({ type: type, url: url });
            if (type === 'video') playSharedVideo(url);
            else playSharedAudio(url);
            toggleMediaInput();
        }

        function playSharedVideo(url) {
            const container = document.getElementById('video-share-container');
            const iframe = document.getElementById('shared-iframe');
            const video = document.getElementById('shared-video-player');
            container.classList.remove('hidden');
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const vid = url.split('v=')[1] || url.split('/').pop().split('?')[0];
                iframe.src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                iframe.classList.remove('hidden'); video.classList.add('hidden');
            } else {
                video.src = url; video.play();
                video.classList.remove('hidden'); iframe.classList.add('hidden');
            }
        }

        function playSharedAudio(url) {
            const audio = document.getElementById('shared-audio');
            audio.src = url; audio.play();
            audio.classList.remove('hidden');
        }

        function closeVideo() {
            document.getElementById('video-share-container').classList.add('hidden');
            document.getElementById('shared-iframe').src = "";
            document.getElementById('shared-video-player').pause();
        }

        function sendFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                conn.send({ type: 'file', data: e.target.result });
                addMessage('', '', 'Você', e.target.result, true);
            };
            reader.readAsDataURL(input.files[0]);
        }

        function sendWink(kind) { conn.send({ type: 'wink', kind: kind }); receiveWink(kind); toggleExtra(); }

        function receiveWink(kind) {
            new Audio(SOUNDS[kind]).play();
            const img = document.getElementById('wink-img');
            img.src = GIFS[kind];
            document.getElementById('wink-layer').style.display = 'flex';
            img.className = 'wink-animation';
            if (kind === 'knock') document.body.classList.add('shake');
            setTimeout(() => { document.getElementById('wink-layer').style.display = 'none'; document.body.classList.remove('shake'); }, 3000);
        }

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const lang = document.getElementById('lang-select').value;
            if (!input.value) return;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input.value)}&langpair=pt|${lang}`);
                const json = await res.json();
                const trans = json.responseData.translatedText;
                conn.send({ text: input.value, trans: trans });
                addMessage(input.value, trans, 'Você');
            } catch {
                conn.send({ text: input.value, trans: input.value });
                addMessage(input.value, input.value, 'Você');
            }
            input.value = '';
        }

        function addMessage(orig, trans, sender, data = null, isFile = false) {
            const box = document.getElementById('chat-messages');
            const isMe = sender === 'Você';
            let html = isFile ? `<img src="${data}" class="rounded-2xl max-w-full">` : `<p class="text-[8px] opacity-40 italic mb-1 uppercase tracking-tighter">${orig}</p><p class="text-sm font-medium">${trans}</p>`;
            box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} animate-fade-in"><div class="${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-200'} p-3 px-4 rounded-2xl max-w-[85%] shadow-lg">${html}</div></div>`;
            box.scrollTop = box.scrollHeight;
        }

        function copyID() { navigator.clipboard.writeText(document.getElementById('peer-id').innerText); alert("ID Copiado!"); }
    </script>
</body>

</html>
