<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Vídeo Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; }

        #remote-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #000; }
        #local-video { position: fixed; top: 60px; right: 15px; width: 85px; height: 120px; border-radius: 15px; object-fit: cover; border: 2px solid rgba(255,255,255,0.4); z-index: 100; transform: scaleX(-1); }

        #ui { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }
        #messages { padding: 15px; display: flex; flex-direction: column; gap: 8px; max-height: 40%; overflow-y: auto; pointer-events: auto; }

        .bubble { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 10px 14px; border-radius: 18px; color: white; font-size: 14px; max-width: 80%; align-self: flex-start; border: 1px solid rgba(255,255,255,0.1); }
        .bubble-me { background: rgba(30, 64, 175, 0.7); align-self: flex-end; }

        #input-area { padding: 15px; display: flex; align-items: center; gap: 10px; pointer-events: auto; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .input-box { flex: 1; background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border-radius: 30px; display: flex; align-items: center; padding: 2px 15px; border: 1px solid rgba(255,255,255,0.2); }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 15px; }

        #login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; items-center; justify-content: center; padding: 20px; pointer-events: auto; }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div id="ui">
        <div class="absolute top-12 left-4 pointer-events-auto">
            <select id="lang" class="bg-black/60 text-white text-[10px] px-3 py-1 rounded-full border border-white/20">
                <option value="en" selected>INGLÊS</option><option value="es">ESPANHOL</option><option value="pt">PT-BR</option>
            </select>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <button onclick="sendWink()" class="text-xl">💋</button>
            <div class="input-box">
                <input id="msg-input" type="text" placeholder="Diga algo...">
            </div>
            <button onclick="sendMsg()" class="bg-blue-600 w-11 h-11 rounded-full flex items-center justify-center text-white shadow-lg font-bold">➤</button>
        </div>
    </div>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-zinc-800 text-center">
            <h1 class="text-blue-500 font-black text-xl mb-6 italic italic">BARROS CONNECT</h1>
            <div id="my-id-ui" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] break-all border border-zinc-800 cursor-pointer" onclick="copy()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-800 text-white text-center outline-none" placeholder="ID DA AMIGA">
            <button onclick="start()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase shadow-lg">CONECTAR VÍDEO</button>
        </div>
    </div>

    <script>
        // Configuração reforçada para conexões difíceis
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        const peer = new Peer(config);
        let conn, localStream;

        // Tenta capturar a câmera do celular
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s;
            document.getElementById('local-video').srcObject = s;
        }).catch(e => alert("Erro ao acessar câmera: " + e));

        peer.on('open', id => document.getElementById('my-id-ui').innerText = id);

        // Quando alguém te liga
        peer.on('call', call => {
            call.answer(localStream);
            setupVideo(call);
        });

        // Quando alguém conecta no chat
        peer.on('connection', c => {
            conn = c;
            conn.on('data', d => addBubble(d.orig, d.trans, false));
            document.getElementById('login').style.display = 'none';
        });

        function start() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;

            // 1. Inicia Chamada de Vídeo
            const call = peer.call(tid, localStream);
            setupVideo(call);

            // 2. Inicia Conexão de Dados (Chat)
            conn = peer.connect(tid);
            conn.on('open', () => {
                conn.on('data', d => addBubble(d.orig, d.trans, false));
                document.getElementById('login').style.display = 'none';
            });
        }

        function setupVideo(call) {
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s;
                // Força o vídeo a dar play no celular
                rv.play().catch(() => {
                    // Se falhar, tenta novamente ao toque
                    window.onclick = () => rv.play();
                });
                document.getElementById('login').style.display = 'none';
            });
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input'), l = document.getElementById('lang').value;
            if(!i.value || !conn) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await res.json();
            const tr = j.responseData.translatedText;
            conn.send({orig: i.value, trans: tr});
            addBubble(i.value, tr, true);
            i.value = '';
        }

        function addBubble(o, t, isMe) {
            const m = document.getElementById('messages');
            m.innerHTML += `<div class="bubble ${isMe?'bubble-me':''}">
                <p class="text-[9px] opacity-60">${o}</p>
                <p>${t}</p>
            </div>`;
            m.scrollTop = m.scrollHeight;
        }

        function copy() { navigator.clipboard.writeText(document.getElementById('my-id-ui').innerText); alert("ID Copiado!"); }
        function sendWink() { if(conn) conn.send({orig: '💋', trans: 'MANDOU UM BEIJO!'}); addBubble('💋', 'MANDOU UM BEIJO!', true); }
    </script>
</body>
</html>
