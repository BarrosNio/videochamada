<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barros Connect - Waplog Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

        /* VÍDEO DA AMIGA (TELA CHEIA) */
        #remote-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* SEU VÍDEO (MINIATURA NO CANTO) */
        #local-video {
            position: fixed;
            bottom: 100px; right: 20px;
            width: 100px; height: 150px;
            border-radius: 15px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 100;
            transform: scaleX(-1);
            background: #222;
        }

        /* CAMADA DE INTERFACE (POR CIMA DE TUDO) */
        #ui-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none; /* Deixa tocar no vídeo se precisar */
        }

        /* ÁREA DE MENSAGENS FLUTUANTES */
        #messages {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 40%;
            overflow-y: auto;
            pointer-events: auto;
            mask-image: linear-gradient(to top, black 80%, transparent 100%);
        }

        .msg-bubble {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            align-self: flex-start;
            max-width: 80%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .msg-me { background: rgba(59, 130, 246, 0.5); }

        /* BARRA DE TEXTO (RODAPÉ) */
        #input-bar {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            pointer-events: auto;
        }

        .input-container {
            flex: 1;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #msg-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 15px;
            outline: none;
        }

        #msg-input::placeholder { color: rgba(255,255,255,0.6); }

        /* MODAL DE LOGIN */
        #login {
            position: fixed; inset: 0;
            background: #000;
            z-index: 1000;
            display: flex; items-center; justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>

    <div id="ui-overlay">
        
        <div class="absolute top-10 left-5 pointer-events-auto">
            <select id="lang-select" class="bg-black/40 backdrop-blur-md text-white text-[10px] p-2 rounded-full border border-white/20 outline-none">
                <option value="en" selected>INGLÊS</option>
                <option value="es">ESPANHOL</option>
                <option value="ru">RUSSO</option>
                <option value="pt">PORTUGUÊS</option>
            </select>
        </div>

        <div id="messages" class="no-scrollbar"></div>

        <div id="input-bar">
            <div class="input-container">
                <button onclick="toggleTranslate()" class="text-xl mr-2">🌐</button>
                <input id="msg-input" type="text" placeholder="Diga algo doce...">
            </div>
            <button onclick="sendMsg()" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg">➤</button>
        </div>
    </div>

    <div id="login">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-xs border border-zinc-800 text-center shadow-2xl">
            <h2 class="text-blue-500 font-black italic text-xl mb-4">BARROS CONNECT</h2>
            <div id="my-id-display" class="bg-black p-4 rounded-xl mb-4 text-blue-400 font-mono text-[10px] border border-zinc-800 break-all cursor-pointer" onclick="copyID()">GERANDO ID...</div>
            <input id="target-id" class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-800 outline-none text-center text-white" placeholder="ID DA AMIGA">
            <button onclick="startApp()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase">COMEÇAR VIBE</button>
        </div>
    </div>

    <script>
        const peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});
        let conn, localStream;

        // Ativa Câmera
        navigator.mediaDevices.getUserMedia({video: { facingMode: "user" }, audio: true}).then(s => {
            localStream = s;
            document.getElementById('local-video').srcObject = s;
        });

        peer.on('open', id => document.getElementById('my-id-display').innerText = id);

        // Receber Chamada
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s;
                rv.play();
                document.getElementById('login').style.display = 'none';
            });
        });

        peer.on('connection', c => { conn = c; setupChat(); });

        function startApp() {
            const tid = document.getElementById('target-id').value;
            if(!tid) return;
            const call = peer.call(tid, localStream);
            call.on('stream', s => {
                const rv = document.getElementById('remote-video');
                rv.srcObject = s;
                rv.play();
                document.getElementById('login').style.display = 'none';
            });
            conn = peer.connect(tid);
            setupChat();
        }

        function setupChat() {
            conn.on('data', d => {
                if(d.type === 'msg') addMsg(d.orig, d.trans, 'friend');
            });
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input'), l = document.getElementById('lang-select').value;
            if(!i.value) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i.value)}&langpair=pt|${l}`);
            const j = await res.json();
            const tr = j.responseData.translatedText;
            if(conn) conn.send({type: 'msg', orig: i.value, trans: tr});
            addMsg(i.value, tr, 'me');
            i.value = '';
        }

        function addMsg(o, t, s) {
            const b = document.getElementById('messages');
            b.innerHTML += `<div class="msg-bubble ${s==='me'?'msg-me':''}">
                <p class="text-[10px] opacity-60">${o}</p>
                <p class="font-medium">${t}</p>
            </div>`;
            b.scrollTop = b.scrollHeight;
        }

        function copyID() { navigator.clipboard.writeText(document.getElementById('my-id-display').innerText); alert("ID Copiado!"); }
    </script>
</body>
</html>
